apiVersion: dockyard.dev/v1alpha1
name: postgres-app
description: Example app and PostgreSQL package using environment-backed secret values
version: 0.1.0
appVersion: "1.0.0"
type: application

compose:
  base: compose.yaml
  overlays: {}

security:
  requireNonRoot: false
  requireHealthchecks: true
  requireReadOnlyRootFilesystem: false
  requireNoNewPrivileges: true
  requireCapDropAll: false
  disallowPrivileged: true
  disallowHostNetwork: true
  disallowDockerSocketMount: true
  disallowHostPathMounts: false
  disallowLatestTag: true
