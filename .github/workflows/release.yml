name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: build ${{ matrix.goos }}-${{ matrix.goarch }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: windows
            goarch: amd64
            suffix: .exe
          - goos: linux
            goarch: amd64
            suffix: ""
          - goos: linux
            goarch: arm64
            suffix: ""
          - goos: darwin
            goarch: amd64
            suffix: ""
          - goos: darwin
            goarch: arm64
            suffix: ""

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Test
        run: go test ./...

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
          VERSION: ${{ github.ref_name }}
          COMMIT: ${{ github.sha }}
          DATE: ${{ github.event.head_commit.timestamp }}
        run: |
          mkdir -p dist
          name="dockyard-${GOOS}-${GOARCH}${{ matrix.suffix }}"
          go build             -trimpath             -ldflags "-s -w -X github.com/nandub/dockyard/internal/version.Version=${VERSION} -X github.com/nandub/dockyard/internal/version.Commit=${COMMIT} -X github.com/nandub/dockyard/internal/version.Date=${DATE}"             -o "dist/${name}"             ./cmd/dockyard

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: dockyard-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/*

  checksums-and-sbom:
    name: checksums and sbom
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Generate checksums
        run: |
          cd dist
          sha256sum dockyard-* > SHA256SUMS

      - name: Install Syft
        uses: anchore/sbom-action/download-syft@v0

      - name: Generate SBOM
        run: syft dir:. -o spdx-json=dist/dockyard-source.spdx.json

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/dockyard-*
            dist/SHA256SUMS
            dist/dockyard-source.spdx.json
